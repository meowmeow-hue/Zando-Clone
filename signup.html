<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>



    <!-- sign up form -->
    <div class="form-container" id="form-signup">
        <div class="form-control">
            <label for="firstname">Firstname</label>
            <input type="text" id="firstname" placeholder="Firstname" name="firstname">
        </div>
        <div class="form-control">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" placeholder="Last Name" name="lastname">
        </div>
        <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email" name="email">
        </div>
        <div class="form-control">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" name="password">
        </div>
        <div class="form-control">
            <button type="submit" class="btnlogin">Sign Up</button>
        </div>
        <div class="forgot-password">
            <a href="#">Forgot Password?</a>
            <a href="login.html">login</a>
        </div>
        <div class="forgot-password">
           <img src="img/google-logo-vector-format-white-background-illustration-407571048-removebg-preview.png" alt=""> <a href="#" style="text-decoration: none;">continue with Google</a>
        </div>
    </div>
</body>
</html>
